name: Match-result auto-update

# Server-side replacement for the Mac-dependent scheduled task: keeps the live
# site's legend match results current without anyone's laptop being open.
#
# Flow each run:
#   1. Detector (pending-results.mjs) lists legend matches that have kicked off
#      but have no `result` yet. If none, the job exits cheaply — no Claude, no
#      tokens. This is why the cron can run often.
#   2. If something's pending, headless Claude Code runs the documented
#      match-result recipe (CLAUDE.md → "The match-result update loop"):
#      fetch + verify the score (>=2 sources), edit ONLY data/players.js, run
#      the stat-integrity check + `npm run build`. It does NOT touch git.
#   3. A deterministic step shows the proposed diff in the run summary, and —
#      only when AUTO_PUSH is "true" — commits + pushes (which auto-deploys via
#      Vercel). Starts in REPORT-ONLY mode (AUTO_PUSH: "false") so we watch one
#      clean cycle before trusting an unattended push. Flip to "true" to go live.
#
# Requires repo secret ANTHROPIC_API_KEY (Settings -> Secrets -> Actions).

on:
  # PROJECT WOUND DOWN 2026-07-19 (World Cup over). The GitHub `schedule` cron is
  # disabled below and the job is hard-gated off (`if: false`) so nothing runs /
  # bills ANTHROPIC_API_KEY. ALSO delete the external cron-job.org job that POSTs
  # to workflow_dispatch every 15 min — that trigger lives outside this repo and
  # keeps firing until removed there. See POSTMORTEM.md wind-down checklist.
  # schedule:
  #   - cron: "13 */6 * * *"
  # PRIMARY TRIGGER (retired): cron-job.org POSTs here every 15 min (workflow_id
  # match-results.yml, body {"ref":"main"}, fine-grained PAT with Actions:write).
  # The detector gates the Claude step, so each dispatch is a free no-op until a
  # match is actually pending.
  workflow_dispatch:
    inputs:
      force_fail:
        description: "TEST ONLY — force the run to fail to exercise the alert step"
        type: boolean
        default: false

permissions:
  contents: write # for the push step (the Claude CLI auths via ANTHROPIC_API_KEY, no OIDC)
  issues: write # for the failure-alert step to open/close a tracking issue

# Don't pile up overlapping runs.
concurrency:
  group: match-results
  cancel-in-progress: false

env:
  AUTO_PUSH: "true" # report-only when "false"; "true" enables unattended push (build-gated below)

jobs:
  fill-results:
    # PROJECT WOUND DOWN 2026-07-19 — hard-off. Even if an external dispatch still
    # fires, this job no-ops and never bills the API key. Remove `if: false` to
    # reactivate. (See POSTMORTEM.md.)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # 22+ auto-detects ESM syntax in data/players.js

      - name: Detect matches needing a result
        id: detect
        run: |
          node scripts/distribution/pending-results.mjs | tee -a "$GITHUB_STEP_SUMMARY"
          COUNT=$(node scripts/distribution/pending-results.mjs --count 2>/dev/null)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Force-fail (TEST ONLY — exercises the failure alert)
        if: ${{ github.event.inputs.force_fail == 'true' }}
        run: |
          echo "force_fail=true → deliberately failing to test the alert step."
          exit 1

      - name: Install deps
        if: steps.detect.outputs.count != '0'
        run: npm ci

      - name: Fill results with Claude CLI (judgment only — no git)
        if: steps.detect.outputs.count != '0'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROMPT: |
            You are the autonomous match-result updater for "The Final Chapter"
            (a static Next.js fan site about five footballers' last World Cup).
            Repo root is the current working directory. The full recipe and the
            data schema are in CLAUDE.md under "The match-result update loop" and
            "data/players.js schema per player" — READ THEM FIRST.

            STEP 1. Run `node scripts/distribution/pending-results.mjs --json` to
            get the list of legend matches that have kicked off but have no
            `result` yet. For EACH pending match, do the following.

            STEP 2. GET THE RESULT — verify against AT LEAST 2 agreeing sources
            (ESPN, the FIFA match centre, a written match report) via WebSearch +
            WebFetch. ESPN's match page is cached ~15 min and can show a stale
            in-progress minute long after full time — cross-check FIFA + a report
            and reason from elapsed time since kickoff (well past 90+stoppage =>
            full time). Determine: final score, the LEGEND'S nation's goalscorers
            with minutes, and specifically whether the legend (the `name` in the
            pending entry) scored or assisted.

            SAFETY GATE: if you cannot confidently confirm a match's FINAL score
            from >=2 agreeing sources, DO NOT edit that match — skip it and note
            why. A missing update is far better than a wrong one. (Disagreement on
            an opponent's scorer minute is fine; our card never shows it.)

            STEP 3. EDIT ONLY data/players.js. Each pending entry carries a
            `type`: "group" (a group fixture) or "knockout" (a knockout round the
            detector found on ESPN). Handle each per its type.

            STEP 3A — TYPE "group": on that player's wc2026.matches entry add:
              result: { outcome: "W"|"D"|"L", score: "own-opp", scorers: "..." }
            - outcome is from the LEGEND'S nation's POV (W/D/L).
            - score is own-opp order, e.g. legend's team 2, opponent 0 => "2-0".
            - scorers: short string, the LEGEND FIRST if he scored/assisted (use
              the ′ prime char for minutes, e.g. "De Bruyne 23′, Lukaku 41′"). If
              the legend did not play or didn't score/assist, list the team's
              actual scorer(s); if relevant note the legend's absence like the
              existing Neymar card ("… · Neymar out (calf)").
            - ALSO set the structured tally fields on that SAME result object:
              `legendGoals: <N>` = goals the LEGEND HIMSELF scored (omit if 0);
              `legendAssists: <N>` = goals he ASSISTED (omit if 0) — ESPN's match
              SUMMARY endpoint (`.../fifa.world/summary?event=<id>`, get the id
              from the scoreboard) credits "Assisted by <name>" on each goal in
              keyEvents[].text / participants[1], so count the goals assisted by
              the legend; and `legendOut: true` ONLY if the legend did NOT feature
              at all (injury / suspension / unused sub). These drive the "so far"
              goals/assists/apps tally AND the live profile-hero totals; a result
              with no `legendOut` counts as one appearance, so you MUST add
              `legendOut: true` whenever he didn't play (the Neymar trap).
            - ALSO update that player's wc2026.status.note to reflect the result
              and point at their next match.
            - ALSO refresh that player's wc2026.groupTable IF it exists: fetch the
              group's CURRENT standings and set teams to all four
              { name, played, points } ordered by current position (group winner
              first), and set asOf to today as a short "Mon DD" date (e.g.
              "Jun 24"). Keep each team `name` spelled exactly as in groupTeams.
            - DO NOT change worldCupGoals / worldCupAssists / worldCupApps or any
              worldCups[] entry — a 2026 result must not alter those totals.
            - DO NOT flip status.stage / status.alive unless the match
              mathematically eliminates the team or clinches advancement; a single
              group game in isolation does neither.

            STEP 3B — TYPE "knockout": the legend's nation played a KNOCKOUT game
            (the entry carries `stage` = the round they were in = the round just
            played, plus `opponent` and `kickoffUtc`). Knockout games can't end
            level — extra time + penalties decide — so from >=2 sources establish
            whether the nation ADVANCED or was ELIMINATED (penalties count). Then:
            - APPEND one entry to that player's wc2026.knockout[] array (create the
              array if it doesn't exist yet):
                { stage: "<the pending entry's stage>", opponent: "<opponent>",
                  kickoffUtc: "<the pending entry's kickoffUtc>",
                  result: { outcome: "W"|"L", score: "own-opp", scorers: "...",
                            legendGoals: <N>, legendAssists: <N>,
                            legendOut: <true if he didn't play> } }
              outcome = W if the nation ADVANCED (incl. on penalties), L if it went
              out. score is own-opp; for a shootout write it like "1-1 (4-3 pens)".
              scorers / legendGoals / legendAssists / legendOut exactly as in 3A
              (they feed the same "so far" tally + hero totals).
            - FLIP wc2026.status.stage — THIS is what advances /road-to-the-final,
              /status, the player strip and the dynamic title, so get it right:
                * ADVANCED → next round in this exact order:
                  r32 → r16 → qf → sf → final → champion (winning the FINAL ⇒
                  "champion"). Keep status.alive = true.
                * ELIMINATED → set status.alive = false and LEAVE status.stage at
                  the round just lost (the lane renders "out" there).
              If you cannot confidently tell advanced-vs-out from >=2 sources, SKIP
              (the SAFETY GATE applies — a wrong flip shows false info).
            - UPDATE wc2026.status.note (next round + date, or "knocked out" /
              "champions").
            - Do NOT touch wc2026.matches[] or groupTable for a knockout game, and
              do NOT change any worldCups[] entry / career totals.

            STEP 4. VERIFY: run the stat-integrity Check 1 command from CLAUDE.md
            (must print OK for all 5 players — a result must NOT change it) and
            `npm run build` (must compile clean). If the build fails or the stat
            check regresses, fix your edit.

            STEP 5. DO NOT run any git command (no add/commit/push). Leave your
            edits in the working tree. Print a clear final summary: for each
            pending match, the verified score, the legend's involvement, and
            whether you recorded it or skipped it (with the reason).
        run: |
          # Run Claude Code via the CLI, NOT claude-code-action — the action
          # needs the Claude GitHub App installed on the repo (it does an app
          # token exchange and 401s without it). The CLI under --bare authes
          # strictly with ANTHROPIC_API_KEY, no GitHub App. bypassPermissions
          # so it never hangs on a prompt; the deterministic git/build steps
          # below are what actually publish (the prompt forbids git).
          npm install -g @anthropic-ai/claude-code
          claude -p "$PROMPT" --bare --permission-mode bypassPermissions \
            --allowedTools "Bash Read Edit Write WebFetch WebSearch" \
            --max-budget-usd 5 --output-format text --no-session-persistence

      - name: Show proposed changes (dry-run diff)
        if: steps.detect.outputs.count != '0'
        run: |
          {
            echo '## Proposed data/players.js changes'
            echo '```diff'
            git --no-pager diff -- data/players.js
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit & push (only when AUTO_PUSH=true)
        if: steps.detect.outputs.count != '0' && env.AUTO_PUSH == 'true'
        run: |
          if git diff --quiet -- data/players.js; then
            echo "No changes to commit."
            exit 0
          fi
          # Stamp the freshness signal shown on /status — proves THIS push
          # reached the live site, not just that a run triggered. Written only
          # when there's a real result change (we're past the diff gate above).
          printf 'export const autoUpdate = { updatedAt: "%s" };\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" > data/autoUpdate.js
          # Re-verify the agent's edit compiles before publishing — a broken
          # data file fails the job here and is NEVER pushed to prod.
          npm run build
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/players.js data/autoUpdate.js
          git commit -m "result: auto-update legend match result(s)"
          git push
          # IndexNow: proactively tell Bing/Yandex to recrawl the pages a result
          # push changes (home, /status, /road, the player pages) instead of
          # waiting for a passive crawl — the during-game freshness ping for the
          # non-Google engines (Bing is already verified via layout.js). Best-
          # effort: a non-2xx must NEVER fail the job or block the deploy. (Google
          # does not consume IndexNow; its recrawl is nudged by the sitemap
          # lastmod, now wired to the real content clock.)
          IN_KEY="8d3f1a6c4b9e7205f3a8c1d6e0b94725"
          curl -s -m 20 -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d "{\"host\":\"finalchapterfc.com\",\"key\":\"$IN_KEY\",\"keyLocation\":\"https://finalchapterfc.com/$IN_KEY.txt\",\"urlList\":[\"https://finalchapterfc.com/\",\"https://finalchapterfc.com/status\",\"https://finalchapterfc.com/road-to-the-final\",\"https://finalchapterfc.com/player/messi\",\"https://finalchapterfc.com/player/ronaldo\",\"https://finalchapterfc.com/player/modric\",\"https://finalchapterfc.com/player/neymar\",\"https://finalchapterfc.com/player/debruyne\"]}" \
            && echo "IndexNow ping sent" || echo "IndexNow ping failed (non-fatal)"

      # --- Failure alerting: a silent failure (e.g. Anthropic credits run out)
      # went unnoticed for ~1.5 days once. These two steps surface it: a failed
      # run opens ONE tracking issue (which emails/notifies the repo owner), and
      # the next successful run auto-closes it. cron-job.org can't catch this —
      # it only sees GitHub's 204 on the dispatch, not the downstream failure.
      - name: Alert on failure — open a tracking issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Match-result auto-updater is failing"
          RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 50 \
                  --json number,title --jq "map(select(.title == \"$TITLE\")) | .[0].number // empty")
          if [ -n "$NUM" ]; then
            echo "Alert issue #$NUM already open — not duplicating (no comment spam)."
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$TITLE" --body \
          "A scheduled run of the match-result updater **failed**: $RUN_URL

          **Most likely cause:** the Anthropic Console credit balance is empty — the agent step prints \`Credit balance is too low\`. Top up at https://console.anthropic.com → Billing → Credits and the next 15-min run recovers on its own.

          Other possibilities: a broken edit caught by the build gate, or an API/auth error — open the run log above to see which.

          This issue **auto-closes** the next time a run succeeds."
          fi

      - name: Resolve alert on success — close the tracking issue
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Match-result auto-updater is failing"
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --limit 50 \
                  --json number,title --jq "map(select(.title == \"$TITLE\")) | .[0].number // empty")
          if [ -n "$NUM" ]; then
            gh issue close "$NUM" --repo "$GITHUB_REPOSITORY" \
              --comment "Recovered — a run just succeeded ($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID). Auto-closing."
          fi
